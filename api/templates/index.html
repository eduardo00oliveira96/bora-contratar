<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro de Vagas</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f5f7fa;
      }

      .card {
        margin-top: 40px;
        border-radius: 12px;
        box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
      }

      .title {
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card p-4">
        <h2 class="mb-4 text-center title">Cadastro de Vagas</h2>

        <form method="POST" action="/salvar_vaga">
          <div class="mb-3">
            <label class="form-label">Título da Vaga</label>
            <input type="text" class="form-control" name="titulo" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea class="form-control" name="descricao" rows="3"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Local de Trabalho</label>
            <input type="text" class="form-control" name="local_trabalho" />
          </div>

          <div class="mb-3">
            <label class="form-label">Tipo de Contrato</label>
            <select class="form-control" name="contrato_trabalho">
              <option>CLT</option>
              <option>PJ</option>
              <option>Estágio</option>
              <option>Freelancer</option>
              <option>Temporário</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Requisitos</label>
            <textarea
              class="form-control"
              name="requisitos"
              rows="3"
            ></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Habilidades</label>
            <textarea
              class="form-control"
              name="habilidades"
              rows="3"
            ></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Salário</label>
            <input
              type="number"
              step="0.01"
              class="form-control"
              name="salario"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Divulgação do Salário</label>
            <select class="form-control" name="divulgacao_salario">
              <option value="sim">Divulgar</option>
              <option value="nao">Não divulgar</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Benefícios</label>
            <textarea
              class="form-control"
              name="beneficios"
              rows="3"
            ></textarea>
          </div>

          <div class="text-center">
            <button class="btn btn-primary w-50">Salvar Vaga</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
